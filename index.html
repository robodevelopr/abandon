<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Survival RPG - V2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        
        /* Game UI */
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #444;
            display: none; /* Hidden until game starts */
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .ui-stat { margin: 5px 0; font-size: 16px; font-weight: bold; }
        
        /* Main Menu UI */
        #main-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1a2a6c, #11294b, #2b1d3d);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        h1 { font-size: 48px; text-shadow: 2px 2px 0px #000; margin-bottom: 40px; color: #f39c12; }
        .menu-btn {
            background: #27ae60;
            color: white;
            border: 2px solid #2ecc71;
            padding: 15px 40px;
            margin: 10px;
            font-size: 20px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            width: 300px;
            transition: 0.2s;
        }
        .menu-btn:hover { background: #2ecc71; transform: scale(1.05); }
        .menu-btn.disabled { background: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>STRANDED: ISLAND SURVIVAL</h1>
        <button class="menu-btn" id="btn-local">Start Local Co-op</button>
        <button class="menu-btn disabled" id="btn-host">Host Network Game (Needs Server)</button>
        <button class="menu-btn disabled" id="btn-join">Join Network Game (Needs Server)</button>
    </div>

    <div id="ui">
        <div class="ui-stat" id="ui-day">Day: 1 (Time: 08:00)</div>
        <div class="ui-stat" id="ui-resources">Wood: 0 | Stone: 0 | Gold: 0</div>
        <div class="ui-stat" id="ui-fire" style="color: #e67e22;">Campfire Fuel: 100%</div>
        <div class="ui-stat" id="ui-msg" style="color: #f1c40f; margin-top: 10px;">Explore the island!</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameRunning = false;

// Menu Logic
document.getElementById('btn-local').addEventListener('click', () => {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    resizeCanvas();
    gameRunning = true;
    gameLoop();
});

document.getElementById('btn-host').addEventListener('click', () => alert("Requires a Node.js/WebSocket backend to route traffic."));
document.getElementById('btn-join').addEventListener('click', () => alert("Requires a Node.js/WebSocket backend to route traffic."));

// --- GAME STATE & TIMING ---
// 3 real minutes (180 seconds) = 1 in-game day (1440 in-game minutes)
// Assuming 60 FPS: 180 seconds * 60 frames = 10,800 frames per day.
// 1440 / 10800 = 0.1333 in-game minutes added per frame.
const TIME_SPEED = 0.1333; 

const gameState = {
    time: 8 * 60, // Start at 8:00 AM
    day: 1,
    wood: 0,
    stone: 0,
    gold: 0,
    message: "Find the shopkeeper!",
    messageTimer: 300,
    showMessage: function(msg) {
        this.message = msg;
        this.messageTimer = 180;
    }
};

// --- INPUT ---
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- CLASSES ---
class Player {
    constructor(x, y, primaryColor, secondaryColor, controls, name) {
        this.x = x;
        this.y = y;
        this.color = primaryColor;
        this.secColor = secondaryColor;
        this.controls = controls;
        this.name = name;
        this.speed = 4.5;
        this.direction = 'down'; // For simple sprite orientation
    }

    update() {
        if (keys[this.controls.up]) { this.y -= this.speed; this.direction = 'up'; }
        if (keys[this.controls.down]) { this.y += this.speed; this.direction = 'down'; }
        if (keys[this.controls.left]) { this.x -= this.speed; this.direction = 'left'; }
        if (keys[this.controls.right]) { this.x += this.speed; this.direction = 'right'; }

        this.x = Math.max(15, Math.min(canvas.width - 15, this.x));
        this.y = Math.max(15, Math.min(canvas.height - 15, this.y));
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(0, 15, 12, 6, 0, 0, Math.PI * 2);
        ctx.fill();

        // Procedural Sprite Body
        ctx.fillStyle = this.color;
        ctx.fillRect(-10, -10, 20, 20); // Torso

        // Pants
        ctx.fillStyle = this.secColor;
        ctx.fillRect(-10, 10, 20, 8); 

        // Head
        ctx.fillStyle = '#f1c27d'; // Skin tone
        ctx.beginPath();
        ctx.arc(0, -15, 10, 0, Math.PI * 2);
        ctx.fill();

        // Hands (offset based on movement)
        ctx.fillStyle = '#f1c27d';
        if (this.direction === 'left' || this.direction === 'right') {
            ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.beginPath(); ctx.arc(-12, 5, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(12, 5, 4, 0, Math.PI*2); ctx.fill();
        }

        // Nameplate
        ctx.fillStyle = 'white';
        ctx.font = '10px Courier';
        ctx.textAlign = 'center';
        ctx.fillText(this.name, 0, -32);

        ctx.restore();
    }
}

class Campfire {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.active = true;
        // 2 days of fuel (2 * 1440 minutes = 2880)
        this.maxFuel = 2880;
        this.currentFuel = this.maxFuel;
    }

    update() {
        if (this.currentFuel > 0) {
            this.currentFuel -= TIME_SPEED;
        } else {
            this.active = false;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Logs
        ctx.fillStyle = '#5c4033';
        ctx.fillRect(-15, 5, 30, 8);
        ctx.fillRect(-8, 2, 16, 12);

        // Fire
        if (this.active) {
            // Flicker effect
            const flicker = Math.random() * 5;
            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.moveTo(-10, 5);
            ctx.lineTo(0, -15 - flicker);
            ctx.lineTo(10, 5);
            ctx.fill();
            
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.moveTo(-5, 5);
            ctx.lineTo(0, -5 - flicker);
            ctx.lineTo(5, 5);
            ctx.fill();
        }
        ctx.restore();
    }
}

class Entity {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.active = true;
    }

    draw(ctx) {
        if (!this.active) return;
        ctx.save();
        ctx.translate(this.x, this.y);

        // Shadow for all entities
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(0, 15, 25, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        if (this.type === 'tree') {
            ctx.fillStyle = '#5c4033';
            ctx.fillRect(-8, -20, 16, 35);
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.arc(0, -25, 25, 0, Math.PI * 2);
            ctx.arc(-15, -15, 20, 0, Math.PI * 2);
            ctx.arc(15, -15, 20, 0, Math.PI * 2);
            ctx.fill();
        } else if (this.type === 'shop') {
            ctx.fillStyle = '#8e44ad';
            ctx.fillRect(-25, -25, 50, 40);
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(-15, -10, 30, 25);
            ctx.fillStyle = '#f1c40f';
            ctx.font = '12px Courier bold';
            ctx.textAlign = 'center';
            ctx.fillText("SHOP", 0, -35);
        } else if (this.type === 'cave') {
            const isNight = isNightTime();
            ctx.fillStyle = '#34495e';
            ctx.beginPath(); ctx.arc(0, 0, 35, Math.PI, 0); ctx.fill();
            ctx.fillStyle = isNight ? '#000' : '#2c3e50';
            ctx.beginPath(); ctx.arc(0, 0, 25, Math.PI, 0); ctx.fill();
            if (!isNight) {
                ctx.fillStyle = '#e74c3c';
                ctx.font = '10px Courier';
                ctx.textAlign = 'center';
                ctx.fillText("LOCKED", 0, -5);
            }
        }
        ctx.restore();
    }
}

// --- SETUP ---
let players = [];
let entities = [];
let mainCampfire;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Re-center entities on resize
    players = [
        new Player(canvas.width / 2 - 50, canvas.height / 2, '#2980b9', '#1abc9c', { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', action: 'KeyE' }, "P1"),
        new Player(canvas.width / 2 + 50, canvas.height / 2, '#c0392b', '#e67e22', { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', action: 'Enter' }, "P2")
    ];
    
    mainCampfire = new Campfire(canvas.width / 2, canvas.height / 2 + 100);

    entities = [
        new Entity(200, 200, 'tree'), new Entity(280, 240, 'tree'), new Entity(150, 400, 'tree'),
        new Entity(canvas.width - 250, 150, 'tree'), new Entity(canvas.width - 150, 200, 'tree'),
        new Entity(canvas.width - 200, 350, 'shop'),
        new Entity(canvas.width / 2, 150, 'cave')
    ];
}

// --- UTILS ---
function isNightTime() {
    const hours = Math.floor(gameState.time / 60);
    return hours >= 20 || hours < 6; // Night: 8PM to 6AM
}

function checkInteractions() {
    players.forEach((player, index) => {
        if (keys[player.controls.action]) {
            keys[player.controls.action] = false; 

            // Check Entities
            entities.forEach(ent => {
                if (!ent.active) return;
                const dist = Math.hypot(player.x - ent.x, player.y - ent.y);
                if (dist < 60) {
                    if (ent.type === 'tree') {
                        ent.active = false;
                        gameState.wood += 5;
                        gameState.showMessage(`${player.name} gathered 5 wood!`);
                    } else if (ent.type === 'shop') {
                        gameState.showMessage(`Shopkeeper: "Got any monster loot?"`);
                    } else if (ent.type === 'cave') {
                        if (isNightTime()) {
                            gameState.showMessage(`Cave entrance is open... Prepare for combat.`);
                        } else {
                            gameState.showMessage(`The cave is sealed until nightfall.`);
                        }
                    }
                }
            });

            // Check Campfire (Add fuel)
            const distFire = Math.hypot(player.x - mainCampfire.x, player.y - mainCampfire.y);
            if (distFire < 60 && gameState.wood > 0 && mainCampfire.currentFuel < mainCampfire.maxFuel) {
                gameState.wood--;
                // 1 wood = 4 in-game hours of fuel (240 mins)
                mainCampfire.currentFuel = Math.min(mainCampfire.maxFuel, mainCampfire.currentFuel + 240);
                mainCampfire.active = true;
                gameState.showMessage(`${player.name} added wood to the fire.`);
            }
        }
    });
}

function updateUI() {
    const hours = Math.floor(gameState.time / 60).toString().padStart(2, '0');
    const minutes = Math.floor(gameState.time % 60).toString().padStart(2, '0');
    
    document.getElementById('ui-day').innerText = `Day: ${gameState.day} (Time: ${hours}:${minutes})`;
    document.getElementById('ui-resources').innerText = `Wood: ${gameState.wood} | Stone: ${gameState.stone} | Gold: ${gameState.gold}`;
    
    const fuelPercent = Math.max(0, Math.floor((mainCampfire.currentFuel / mainCampfire.maxFuel) * 100));
    const fireUI = document.getElementById('ui-fire');
    fireUI.innerText = `Campfire Fuel: ${fuelPercent}%`;
    fireUI.style.color = fuelPercent < 20 ? '#e74c3c' : '#e67e22'; // Turn red if low

    const msgEl = document.getElementById('ui-msg');
    if (gameState.messageTimer > 0) {
        msgEl.innerText = gameState.message;
        gameState.messageTimer--;
    } else {
        msgEl.innerText = "";
    }
}

// --- MAIN LOOP ---
function gameLoop() {
    if (!gameRunning) return;

    // Time Update
    gameState.time += TIME_SPEED;
    if (gameState.time >= 24 * 60) {
        gameState.time = 0;
        gameState.day++;
        if (gameState.day === 10) gameState.showMessage("WARNING: The Cave trembles...");
    }

    mainCampfire.update();
    players.forEach(p => p.update());
    checkInteractions();

    // Render Ground
    ctx.fillStyle = '#1e5f38'; // Darker, richer grass
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid/Texture for better graphics
    ctx.strokeStyle = 'rgba(0,0,0,0.05)';
    ctx.lineWidth = 2;
    for(let i = 0; i < canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for(let i = 0; i < canvas.height; i+=40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Render Objects (Sort by Y for faux-3D depth)
    const renderQueue = [...entities.filter(e=>e.active), ...players, mainCampfire];
    renderQueue.sort((a, b) => a.y - b.y);
    renderQueue.forEach(obj => obj.draw(ctx));

    // Night/Lighting Pass
    if (isNightTime()) {
        ctx.fillStyle = 'rgba(5, 5, 20, 0.85)'; // Deep blue night
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.globalCompositeOperation = 'destination-out';
        
        // Campfire Light
        if (mainCampfire.active) {
            const gradient = ctx.createRadialGradient(mainCampfire.x, mainCampfire.y, 20, mainCampfire.x, mainCampfire.y, 200);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath(); ctx.arc(mainCampfire.x, mainCampfire.y, 200, 0, Math.PI * 2); ctx.fill();
        }

        // Flashlights (Directional light based on movement)
        players.forEach(p => {
            ctx.save();
            ctx.translate(p.x, p.y);
            
            // Subtle body glow
            let glow = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
            glow.addColorStop(0, 'rgba(255,255,255,0.3)');
            glow.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = glow;
            ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        });

        ctx.globalCompositeOperation = 'source-over';
    }

    updateUI();
    requestAnimationFrame(gameLoop);
}

window.addEventListener('resize', () => {
    if(!gameRunning) resizeCanvas();
});
</script>
</body>
</html>
